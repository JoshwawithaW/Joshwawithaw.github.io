<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Club & Drawing Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- PDF.js for rendering pages from PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #11111b;
            --card-bg: #1a1a2e;
            --text-color: #f5e0dc;
            --accent: #cba6f7;
            --accent-2: #f38ba8;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --glass-shadow: rgba(0, 0, 0, 0.35);
            --glass-blur: 18px;
            --nav-height: 64px;
            --frame-gold: rgba(180, 160, 130, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- BLOB & BLUR EFFECTS --- */
        @keyframes rotate {
            from { rotate: 0deg; }
            50% { scale: 1 1.5; }
            to { rotate: 360deg; }
        }

        @keyframes blobPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.9; }
        }

        #blob {
            background-color: white;
            height: 34vmax;
            aspect-ratio: 1;
            position: fixed;
            left: 50%;
            top: 50%;
            translate: -50% -50%;
            border-radius: 50%;
            background: linear-gradient(to right, #b4befe, #f38ba8);
            animation: rotate 20s infinite, blobPulse 8s ease-in-out infinite;
            opacity: 0.75;
            z-index: -2;
            transition: background 0.8s ease;
        }

        body.gallery-mode #blob {
            background: linear-gradient(to right, #f0d5a8, #e8c4a0);
            opacity: 0.55;
        }

        #blur {
            height: 100%;
            width: 100%;
            position: fixed;
            z-index: -1;
            backdrop-filter: blur(12vmax);
            pointer-events: none;
        }

        /* --- GLASS NAVIGATION --- */
        #glass-nav {
            position: fixed;
            top: 16px;
            left: 50%;
            translate: -50% 0;
            z-index: 2000;
            display: flex;
            gap: 6px;
            padding: 6px;
            background: rgba(20, 20, 35, 0.55);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow:
                0 8px 32px var(--glass-shadow),
                0 1px 0 var(--glass-highlight) inset,
                0 -1px 0 rgba(0, 0, 0, 0.3) inset;
            user-select: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #glass-nav:hover {
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.45),
                0 1px 0 rgba(255, 255, 255, 0.3) inset,
                0 -1px 0 rgba(0, 0, 0, 0.25) inset;
            background: rgba(25, 25, 42, 0.65);
        }

        .nav-tab {
            position: relative;
            padding: 11px 26px;
            border-radius: 32px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: rgba(245, 224, 220, 0.7);
            background: transparent;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-tab:hover {
            color: rgba(245, 224, 220, 0.95);
            background: rgba(255, 255, 255, 0.06);
        }

        .nav-tab.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
            font-weight: 600;
            box-shadow:
                0 4px 16px rgba(0, 0, 0, 0.3),
                0 1px 0 rgba(255, 255, 255, 0.2) inset,
                0 -1px 0 rgba(0, 0, 0, 0.2) inset;
            border: 1px solid rgba(255, 255, 255, 0.22);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            translate: -50% 0;
            width: 30%;
            height: 2px;
            border-radius: 2px;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent), 0 0 4px var(--accent);
            opacity: 0.8;
        }

        .nav-tab .tab-icon {
            display: inline-block;
            margin-right: 6px;
            font-size: 0.85rem;
            vertical-align: -1px;
        }

        /* --- MAIN SECTIONS --- */
        #book-section {
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
            padding-top: 80px;
        }

        body.gallery-mode #book-section {
            opacity: 0;
            transform: translateY(-30px);
            pointer-events: none;
            position: absolute;
            width: 100%;
        }

        #gallery-section {
            position: fixed;
            inset: 0;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px);
            overflow-y: auto;
            overflow-x: hidden;
            padding: calc(var(--nav-height) + 40px) 5vw 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 28px;
            align-content: start;
            justify-items: center;
            background: radial-gradient(ellipse at 50% 30%, rgba(20, 18, 28, 0.5) 0%, rgba(17, 17, 27, 0.85) 70%);
            scroll-behavior: smooth;
        }

        body.gallery-mode #gallery-section {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        body.gallery-mode {
            overflow: hidden;
        }
        body.gallery-mode #gallery-section {
            overflow-y: auto;
        }

        /* --- GALLERY ITEMS (Glass Skeuomorphic Frames) --- */
        .gallery-item {
            position: relative;
            width: 100%;
            max-width: 340px;
            aspect-ratio: 3 / 4;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.4s cubic-bezier(0.25, 0, 0.25, 1),
                box-shadow 0.4s cubic-bezier(0.25, 0, 0.25, 1);
            box-shadow:
                0 16px 40px rgba(0, 0, 0, 0.5),
                0 4px 12px rgba(0, 0, 0, 0.3);
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow:
                0 28px 56px rgba(0, 0, 0, 0.55),
                0 8px 20px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .gallery-item .glass-frame {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            border-radius: 6px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                0 0 0 8px rgba(20, 18, 15, 0.7),
                0 0 0 10px rgba(180, 160, 130, 0.2),
                0 0 0 11px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2),
                inset 1px 0 0 rgba(255, 255, 255, 0.1),
                inset -1px 0 0 rgba(0, 0, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.25, 0, 0.25, 1);
        }

        .gallery-item:hover .glass-frame {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow:
                0 0 0 8px rgba(20, 18, 15, 0.75),
                0 0 0 10px rgba(200, 175, 140, 0.3),
                0 0 0 11px rgba(0, 0, 0, 0.55),
                inset 0 2px 0 rgba(255, 255, 255, 0.4),
                inset 0 -1px 0 rgba(0, 0, 0, 0.25),
                inset 1px 0 0 rgba(255, 255, 255, 0.15),
                inset -1px 0 0 rgba(0, 0, 0, 0.2);
        }

        .gallery-item .glass-frame::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 4px;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0.18) 0%,
                    rgba(255, 255, 255, 0.04) 30%,
                    transparent 50%,
                    rgba(255, 255, 255, 0.01) 70%,
                    rgba(255, 255, 255, 0.08) 100%);
            opacity: 0.7;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .gallery-item:hover .glass-frame::after {
            opacity: 1;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0.22) 0%,
                    rgba(255, 255, 255, 0.06) 25%,
                    transparent 48%,
                    rgba(255, 255, 255, 0.02) 72%,
                    rgba(255, 255, 255, 0.1) 100%);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 4px;
            position: relative;
            z-index: 1;
            filter: brightness(0.95) contrast(1.02);
            transition: filter 0.4s ease, transform 0.4s ease;
        }

        .gallery-item:hover img {
            filter: brightness(1.05) contrast(1.04);
            transform: scale(1.015);
        }

        .gallery-label {
            position: absolute;
            bottom: -32px;
            left: 50%;
            translate: -50% 0;
            z-index: 3;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 0.9rem;
            font-style: italic;
            color: rgba(245, 224, 220, 0.7);
            text-align: center;
            white-space: nowrap;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .gallery-item:hover .gallery-label {
            color: rgba(245, 224, 220, 0.95);
        }

        /* --- GALLERY LIGHTBOX --- */
        #gallery-lightbox {
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            cursor: pointer;
        }

        #gallery-lightbox.active {
            opacity: 1;
            pointer-events: all;
        }

        #gallery-lightbox img {
            max-width: 85vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow:
                0 0 0 12px rgba(20, 18, 15, 0.8),
                0 0 0 14px rgba(180, 160, 130, 0.25),
                0 0 0 16px rgba(0, 0, 0, 0.6),
                0 40px 80px rgba(0, 0, 0, 0.6);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.25, 0, 0.25, 1);
        }

        #gallery-lightbox.active img {
            transform: scale(1);
        }

        #lightbox-close {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 3001;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        #gallery-lightbox.active ~ #lightbox-close,
        #lightbox-close.visible {
            opacity: 1;
            pointer-events: all;
        }

        #lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* --- Search Bar --- */
        #search-container {
            position: fixed;
            top: 80px;
            left: 0;
            width: 100%;
            padding: 16px 20px;
            z-index: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
        }

        #search-container > * {
            pointer-events: all;
        }

        body.gallery-mode #search-container {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-20px);
        }

        #search-input {
            background: rgba(30, 30, 48, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 13px 28px;
            border-radius: 34px;
            color: var(--text-color);
            font-size: 1rem;
            font-family: 'Inter', system-ui, sans-serif;
            width: 300px;
            outline: none;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.35s ease,
                border-color 0.35s ease,
                background 0.35s ease;
            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.3),
                0 1px 0 rgba(255, 255, 255, 0.08) inset;
        }

        #search-input:focus {
            width: 420px;
            border-color: rgba(203, 166, 247, 0.5);
            box-shadow:
                0 8px 32px rgba(203, 166, 247, 0.2),
                0 1px 0 rgba(255, 255, 255, 0.12) inset;
            background: rgba(35, 35, 55, 0.7);
        }

        #search-input::placeholder {
            color: rgba(245, 224, 220, 0.45);
        }

        /* --- Year Headers --- */
        .year-header {
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 900;
            color: rgba(255, 255, 255, 0.025);
            position: absolute;
            left: 5vw;
            pointer-events: none;
            z-index: 0;
            line-height: 1;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            letter-spacing: -0.02em;
        }

        /* --- Track Container --- */
        .track-container {
            position: relative;
            height: 60vh;
            width: 100vw;
            display: flex;
            align-items: center;
            margin-bottom: 5vh;
        }

        .image-track {
            display: flex;
            gap: 4vmin;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(0%, -50%);
            user-select: none;
            transition: opacity 0.5s ease;
        }

        /* --- Images --- */
        .image-wrapper {
            position: relative;
            width: 35vmin;
            height: 50vmin;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform-style: preserve-3d;
            border-radius: 8px;
            box-shadow:
                0 8px 28px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .image-wrapper:hover {
            box-shadow:
                0 14px 40px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.12);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 100% center;
            display: block;
            border-radius: 8px;
            transition: object-position 0.1s linear;
        }

        .image-wrapper::after {
            content: "";
            position: absolute;
            inset: 0;
            background-color: var(--tint, transparent);
            mix-blend-mode: multiply;
            opacity: 0.4;
            pointer-events: none;
            transition: opacity 0.4s ease;
            border-radius: 8px;
        }

        .image-wrapper:hover::after {
            opacity: 0.1;
        }

        /* --- Details Overlay --- */
        #details-view {
            position: fixed;
            inset: 0;
            background-color: transparent;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #details-background {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.25);
            z-index: 0;
            transform: scale(1.1);
        }

        body.details-active #details-view {
            opacity: 1;
            pointer-events: all;
        }
        body.details-active {
            overflow: hidden;
        }
        body.details-active .image-track {
            opacity: 0;
            pointer-events: none;
        }
        body.details-active #search-container {
            opacity: 0;
            pointer-events: none;
        }
        body.details-active #glass-nav {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #details-content {
            position: relative;
            z-index: 10;
            width: 50vw;
            height: 100vh;
            color: var(--text-color);
            padding: 8vmin;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transform: translateX(-20px);
            transition: transform 0.5s ease;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        body.details-active #details-content {
            transform: translateX(0);
        }

        #details-content h2 {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: clamp(2rem, 4vw, 3.5rem);
            margin: 0 0 1rem 0;
            color: var(--accent);
            font-weight: 700;
        }

        #details-content p {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: clamp(1rem, 1.6vw, 1.3rem);
            line-height: 1.7;
            opacity: 0.9;
        }

        #back-button {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.22);
            padding: 13px 34px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 34px;
            margin-top: 2rem;
            align-self: flex-start;
            transition: all 0.3s ease;
            font-family: 'Inter', system-ui, sans-serif;
            letter-spacing: 0.02em;
            box-shadow:
                0 4px 16px rgba(0, 0, 0, 0.3),
                0 1px 0 rgba(255, 255, 255, 0.1) inset;
        }
        #back-button:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow:
                0 8px 28px rgba(0, 0, 0, 0.4),
                0 1px 0 rgba(255, 255, 255, 0.18) inset;
            transform: translateY(-2px);
        }

        .image-wrapper.expanded {
            width: 40vw;
            height: 80vh;
            z-index: 1003;
            top: 50% !important;
            left: 75% !important;
            transform: translate(-50%, -50%) rotate(0deg) !important;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            border-radius: 12px;
        }
        .image-wrapper.expanded::after { opacity: 0; }
        .image-wrapper.expanded img { border-radius: 12px; }

        .image-wrapper.dimmed {
            opacity: 0.15;
            transform: scale(0.88);
            pointer-events: none;
            filter: grayscale(0.5);
            transition: opacity 0.45s ease, transform 0.45s ease, filter 0.45s ease;
        }

        .gallery-section-header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 10px;
        }
        .gallery-section-header h2 {
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: clamp(2rem, 4vw, 3rem);
            color: rgba(245, 224, 220, 0.8);
            font-weight: 600;
            letter-spacing: 0.03em;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }
        .gallery-section-header .subtitle {
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.85rem;
            color: rgba(245, 224, 220, 0.5);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Loading indicator */
        #gallery-loading {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            padding: 40px;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            #glass-nav {
                top: 8px;
                padding: 4px;
                gap: 3px;
                border-radius: 30px;
            }
            .nav-tab {
                padding: 9px 16px;
                font-size: 0.78rem;
                border-radius: 24px;
            }
            #search-input {
                width: 220px;
                padding: 11px 20px;
                font-size: 0.9rem;
            }
            #search-input:focus { width: 280px; }
            #gallery-section {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 18px;
                padding: calc(var(--nav-height) + 24px) 16px 40px;
            }
            .gallery-item .glass-frame {
                border-width: 1.5px;
                box-shadow:
                    0 0 0 5px rgba(20, 18, 15, 0.7),
                    0 0 0 7px rgba(180, 160, 130, 0.18),
                    0 0 0 8px rgba(0, 0, 0, 0.5),
                    inset 0 1px 0 rgba(255, 255, 255, 0.25),
                    inset 0 -1px 0 rgba(0, 0, 0, 0.15);
            }
            #details-content { width: 85vw; padding: 5vmin; }
        }
    </style>
</head>
<body>
    <div id="blob"></div>
    <div id="blur"></div>

    <!-- Glass Navigation -->
    <nav id="glass-nav">
        <button class="nav-tab active" data-section="book" aria-label="Book Club Section">
            <span class="tab-icon">📚</span> Book Club
        </button>
        <button class="nav-tab" data-section="gallery" aria-label="Drawing Gallery">
            <span class="tab-icon">🎨</span> My Drawings
        </button>
    </nav>

    <!-- Book Club Section -->
    <section id="book-section">
        <div id="search-container">
            <input type="text" id="search-input" placeholder="🔍  Find a book...">
        </div>

        <div class="track-container">
            <div class="year-header" style="top: 10%;">2025</div>
            <div class="image-track" data-mouse-down-at="0" data-prev-percentage="0" data-percentage="0">
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="Jane Eyre" data-description="A novel that challenges the conventions of its time, presenting a fierce, independent heroine who refuses to compromise her integrity for love or societal acceptance.">

    <!-- Drawing Gallery (dynamically filled from PDFs) -->
    <section id="gallery-section">
        <div class="gallery-section-header">
            <h2>My Drawings</h2>
            <p class="subtitle">Click any artwork to enlarge</p>
        </div>
        <div id="gallery-grid" style="display: contents;"></div>
        <div id="gallery-loading">Loading drawings from PDFs…</div>
    </section>

    <!-- Gallery Lightbox -->
    <div id="gallery-lightbox">
        <img src="" alt="Enlarged drawing" id="lightbox-img" />
    </div>
    <button id="lightbox-close" aria-label="Close lightbox">✕</button>

    <!-- Book Details Overlay -->
    <div id="details-view">
        <div id="details-background"></div>
        <div id="details-content">
            <h2 id="details-title">Title</h2>
            <p id="details-description">Desc</p>
            <button id="back-button">←  Close</button>
        </div>
    </div>

    <script>
        /* ===================== MULTI-PDF GALLERY CONFIGURATION ===================== */
        // List all your PDF filenames here (place them in the same folder as this HTML)
        const PDF_FILES = [
            'drawings1.pdf',
            'drawings2.pdf',
            'drawings3.pdf'
            // Add more files as needed
        ];

        // PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let pdfDocs = [];
        let galleryRendered = false;

        const galleryGrid = document.getElementById('gallery-grid');
        const galleryLoading = document.getElementById('gallery-loading');
        const gallerySection = document.getElementById('gallery-section');

        // Lightbox elements
        const lightbox = document.getElementById('gallery-lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxClose = document.getElementById('lightbox-close');

        /* --- Load all PDFs and render every page as a gallery item --- */
        async function loadGalleryFromPDFs() {
            if (galleryRendered) return;
            galleryLoading.style.display = 'block';

            let globalDrawingNumber = 1; // sequential number across all PDFs

            try {
                for (const pdfUrl of PDF_FILES) {
                    console.log(`Loading PDF: ${pdfUrl}`);
                    const pdfDoc = await pdfjsLib.getDocument(pdfUrl).promise;
                    const totalPages = pdfDoc.numPages;

                    for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                        const page = await pdfDoc.getPage(pageNum);
                        const viewport = page.getViewport({ scale: 1.5 }); // high resolution
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;

                        await page.render({
                            canvasContext: context,
                            viewport: viewport
                        }).promise;

                        // Convert to high-quality JPEG data URL
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.92);

                        // Create gallery item
                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        item.setAttribute('data-src', dataUrl);

                        const img = document.createElement('img');
                        img.src = dataUrl;
                        img.alt = `Drawing ${globalDrawingNumber}`;
                        img.loading = 'lazy';
                        img.draggable = false;

                        const frame = document.createElement('div');
                        frame.className = 'glass-frame';

                        const label = document.createElement('span');
                        label.className = 'gallery-label';
                        label.textContent = `Drawing ${globalDrawingNumber}`;

                        item.appendChild(img);
                        item.appendChild(frame);
                        item.appendChild(label);

                        // Lightbox click handler
                        item.addEventListener('click', (e) => {
                            if (window.getSelection().toString().length > 0) return;
                            const src = item.getAttribute('data-src');
                            lightboxImg.src = src;
                            lightbox.classList.add('active');
                            lightboxClose.classList.add('visible');
                            document.body.style.overflow = 'hidden';
                        });

                        galleryGrid.appendChild(item);
                        globalDrawingNumber++;
                    }
                }

                galleryLoading.style.display = 'none';
                galleryRendered = true;
                console.log(`✅ Gallery loaded: ${globalDrawingNumber - 1} drawings from ${PDF_FILES.length} PDF(s)`);
            } catch (error) {
                console.error('Failed to load PDFs:', error);
                galleryLoading.innerHTML = '⚠️ Could not load drawings. Check that PDF files exist and are in the same folder.';
                galleryLoading.style.color = '#f38ba8';
            }
        }

        /* --- Lightbox close functions --- */
        function closeLightbox() {
            lightbox.classList.remove('active');
            lightboxClose.classList.remove('visible');
            if (!document.body.classList.contains('gallery-mode')) {
                document.body.style.overflow = '';
            }
            setTimeout(() => {
                if (!lightbox.classList.contains('active')) {
                    lightboxImg.src = '';
                }
            }, 400);
        }

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });
        lightboxClose.addEventListener('click', closeLightbox);

        /* --- Tab navigation triggers PDF load --- */
        const navTabs = document.querySelectorAll('.nav-tab');
        const bookSection = document.getElementById('book-section');
        const body = document.body;

        navTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                if (tab.classList.contains('active')) return;

                navTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const section = tab.dataset.section;
                if (section === 'gallery') {
                    body.classList.add('gallery-mode');
                    body.classList.remove('details-active');
                    // Reset any expanded book card
                    const expanded = document.querySelector('.image-wrapper.expanded');
                    if (expanded) {
                        resetExpandedCard(expanded);
                    }
                    document.body.classList.remove('details-active');
                    // Trigger PDF gallery load if not yet done
                    if (!galleryRendered) {
                        loadGalleryFromPDFs();
                    }
                } else {
                    body.classList.remove('gallery-mode');
                }
            });
        });

        /* --- BOOK CLUB FUNCTIONALITY (unchanged) --- */
        const searchInput = document.getElementById('search-input');
        const allWrappers = document.querySelectorAll('.image-wrapper');

        searchInput.addEventListener('input', (e) => {
            const value = e.target.value.toLowerCase();
            allWrappers.forEach(wrapper => {
                const title = wrapper.dataset.title.toLowerCase();
                wrapper.classList.toggle('dimmed', !title.includes(value));
            });
        });

        let activeTrack = null;
        let isDragging = false;
        let startX = 0;

        const handleOnDown = (e) => {
            if (document.body.classList.contains("details-active")) return;
            if (document.body.classList.contains("gallery-mode")) return;
            activeTrack = e.target.closest('.image-track');
            if (!activeTrack) return;
            startX = e.clientX || e.touches[0].clientX;
            activeTrack.dataset.mouseDownAt = startX;
            isDragging = false;
        };

        const handleOnUp = () => {
            if (activeTrack) {
                activeTrack.dataset.mouseDownAt = "0";
                activeTrack.dataset.prevPercentage = activeTrack.dataset.percentage;
                activeTrack = null;
            }
        };

        const handleOnMove = (e) => {
            if (!activeTrack || activeTrack.dataset.mouseDownAt === "0") return;
            const clientX = e.clientX || e.touches[0].clientX;
            const mouseDelta = parseFloat(activeTrack.dataset.mouseDownAt) - clientX;
            if (Math.abs(mouseDelta) > 5) isDragging = true;
            const maxDelta = window.innerWidth / 2;
            const percentage = (mouseDelta / maxDelta) * -100;
            let nextPercentage = parseFloat(activeTrack.dataset.prevPercentage) + percentage;
            nextPercentage = Math.max(Math.min(nextPercentage, 0), -100);
            activeTrack.dataset.percentage = nextPercentage;
            activeTrack.animate({
                transform: `translate(${nextPercentage}%, -50%)`
            }, { duration: 1200, fill: "forwards" });
            const images = activeTrack.getElementsByClassName("image-wrapper");
            for (const wrapper of images) {
                const img = wrapper.querySelector("img");
                img.animate({
                    objectPosition: `${100 + nextPercentage}% center`
                }, { duration: 1200, fill: "forwards" });
                wrapper.animate({
                    transform: `rotate(${nextPercentage * 0.2}deg)`
                }, { duration: 1200, fill: "forwards" });
            }
        };

        window.onmousedown = e => handleOnDown(e);
        window.ontouchstart = e => handleOnDown(e);
        window.onmouseup = e => handleOnUp(e);
        window.ontouchend = e => handleOnUp(e);
        window.onmousemove = e => handleOnMove(e);
        window.ontouchmove = e => handleOnMove(e);

        const blob = document.getElementById("blob");
        window.onpointermove = event => {
            const { clientX, clientY } = event;
            blob.animate({
                left: `${clientX}px`,
                top: `${clientY}px`
            }, { duration: 3000, fill: "forwards" });
        };

        const detailsView = document.getElementById("details-view");
        const detailsBg = document.getElementById("details-background");
        const backButton = document.getElementById("back-button");
        const detailsTitle = document.getElementById("details-title");
        const detailsDescription = document.getElementById("details-description");
        let originalStyle = "";

        allWrappers.forEach(wrapper => {
            wrapper.addEventListener("click", () => {
                if (isDragging) return;
                if (document.body.classList.contains("gallery-mode")) return;
                detailsTitle.textContent = wrapper.dataset.title;
                detailsDescription.textContent = wrapper.dataset.description;
                const img = wrapper.querySelector("img");
                const tint = wrapper.style.getPropertyValue("--tint");
                detailsBg.style.backgroundImage = `url(${img.src})`;
                detailsTitle.style.color = tint;
                originalStyle = wrapper.getAttribute("style");
                const rect = wrapper.getBoundingClientRect();
                wrapper.style.position = 'fixed';
                wrapper.style.top = `${rect.top}px`;
                wrapper.style.left = `${rect.left}px`;
                wrapper.style.width = `${rect.width}px`;
                wrapper.style.height = `${rect.height}px`;
                wrapper.style.zIndex = '1001';
                requestAnimationFrame(() => {
                    document.body.classList.add("details-active");
                    wrapper.classList.add("expanded");
                });
            });
        });

        function resetExpandedCard(expandedWrapper) {
            if (!expandedWrapper) return;
            expandedWrapper.classList.remove("expanded");
            expandedWrapper.addEventListener('transitionend', () => {
                if (originalStyle) {
                    expandedWrapper.setAttribute("style", originalStyle);
                } else {
                    expandedWrapper.removeAttribute("style");
                }
                const parentTrack = expandedWrapper.closest('.image-track');
                if (parentTrack) {
                    const currentPercent = parseFloat(parentTrack.dataset.percentage) || 0;
                    expandedWrapper.animate({
                        transform: `rotate(${currentPercent * 0.2}deg)`
                    }, { duration: 0, fill: "forwards" });
                }
            }, { once: true });
        }

        const hideDetails = () => {
            const expandedWrapper = document.querySelector(".image-wrapper.expanded");
            if (!expandedWrapper) return;
            document.body.classList.remove("details-active");
            resetExpandedCard(expandedWrapper);
        };

        backButton.addEventListener("click", hideDetails);
        detailsView.addEventListener("click", (e) => {
            if (e.target === detailsView || e.target === detailsBg) hideDetails();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (lightbox.classList.contains('active')) {
                    closeLightbox();
                } else if (document.body.classList.contains('details-active')) {
                    hideDetails();
                }
            }
        });

        document.addEventListener('dragstart', (e) => {
            if (e.target.tagName === 'IMG') e.preventDefault();
        });

        // Initial state
        window.addEventListener('load', () => {
            body.classList.remove('gallery-mode');
            document.querySelector('.nav-tab[data-section="book"]').classList.add('active');
            document.querySelector('.nav-tab[data-section="gallery"]').classList.remove('active');
        });
    </script>
