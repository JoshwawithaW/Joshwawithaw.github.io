<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Club & Drawing Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #11111b;
            --card-bg: #1a1a2e;
            --text-color: #f5e0dc;
            --accent: #cba6f7;
            --accent-2: #f38ba8;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --glass-shadow: rgba(0, 0, 0, 0.35);
            --glass-blur: 18px;
            --nav-height: 64px;
            --frame-gold: rgba(180, 160, 130, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- BLOB & BLUR EFFECTS --- */
        @keyframes rotate {
            from { rotate: 0deg; }
            50% { scale: 1 1.5; }
            to { rotate: 360deg; }
        }

        @keyframes blobPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.9; }
        }

        #blob {
            background-color: white;
            height: 34vmax;
            aspect-ratio: 1;
            position: fixed;
            left: 50%;
            top: 50%;
            translate: -50% -50%;
            border-radius: 50%;
            background: linear-gradient(to right, #b4befe, #f38ba8);
            animation: rotate 20s infinite, blobPulse 8s ease-in-out infinite;
            opacity: 0.75;
            z-index: -2;
            transition: background 0.8s ease;
        }

        body.gallery-mode #blob {
            background: linear-gradient(to right, #f0d5a8, #e8c4a0);
            opacity: 0.55;
        }

        #blur {
            height: 100%;
            width: 100%;
            position: fixed;
            z-index: -1;
            backdrop-filter: blur(12vmax);
            pointer-events: none;
        }

        /* --- GLASS NAVIGATION --- */
        #glass-nav {
            position: fixed;
            top: 16px;
            left: 50%;
            translate: -50% 0;
            z-index: 2000;
            display: flex;
            gap: 6px;
            padding: 6px;
            background: rgba(20, 20, 35, 0.55);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow:
                0 8px 32px var(--glass-shadow),
                0 1px 0 var(--glass-highlight) inset,
                0 -1px 0 rgba(0, 0, 0, 0.3) inset;
            user-select: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #glass-nav:hover {
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.45),
                0 1px 0 rgba(255, 255, 255, 0.3) inset,
                0 -1px 0 rgba(0, 0, 0, 0.25) inset;
            background: rgba(25, 25, 42, 0.65);
        }

        .nav-tab {
            position: relative;
            padding: 11px 26px;
            border-radius: 32px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: rgba(245, 224, 220, 0.7);
            background: transparent;
            transition: all 0.35s ease;
            white-space: nowrap;
            outline: none;
        }

        .nav-tab:hover {
            color: rgba(245, 224, 220, 0.95);
            background: rgba(255, 255, 255, 0.06);
        }

        .nav-tab.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            translate: -50% 0;
            width: 30%;
            height: 2px;
            border-radius: 2px;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }

        /* --- MAIN SECTIONS --- */
        #book-section {
            transition: opacity 0.5s ease, transform 0.5s ease;
            padding-top: 100px;
        }

        body.gallery-mode #book-section {
            opacity: 0;
            transform: translateY(-30px);
            pointer-events: none;
            position: absolute;
        }

        #gallery-section {
            position: fixed;
            inset: 0;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.55s ease, transform 0.55s ease;
            transform: translateY(20px);
            overflow-y: auto;
            padding: calc(var(--nav-height) + 40px) 5vw 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 28px;
            justify-items: center;
        }

        body.gallery-mode #gallery-section {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        body.gallery-mode { overflow: hidden; }

        /* --- SEARCH BAR --- */
        #search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            position: relative;
            z-index: 500;
        }

        #search-input {
            background: rgba(30, 30, 48, 0.55);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 13px 28px;
            border-radius: 34px;
            color: var(--text-color);
            width: 300px;
            outline: none;
            transition: all 0.35s ease;
        }

        #search-input:focus {
            width: 420px;
            border-color: rgba(203, 166, 247, 0.5);
            box-shadow: 0 8px 32px rgba(203, 166, 247, 0.2);
        }

        /* --- TRACK CONTAINER (Books) --- */
        .track-container {
            position: relative;
            height: 50vh;
            width: 100vw;
            display: flex;
            align-items: center;
            margin-bottom: 5vh;
            overflow: hidden; /* Prevent horizontal scrollbar on body */
        }

        .year-header {
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            position: absolute;
            left: 5vw;
            pointer-events: none;
            z-index: 0;
            font-family: 'Cormorant Garamond', serif;
        }

        .image-track {
            display: flex;
            gap: 4vmin;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(0%, -50%);
            user-select: none;
            cursor: grab;
        }
        
        .image-track:active {
            cursor: grabbing;
        }

        .image-wrapper {
            position: relative;
            width: 30vmin;
            height: 45vmin;
            flex-shrink: 0;
            border-radius: 8px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .image-wrapper.hidden {
            display: none;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            pointer-events: none; /* Prevents dragging the ghost image */
        }

        /* --- DETAILS OVERLAY --- */
        #details-view {
            position: fixed;
            inset: 0;
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
        }

        body.details-active #details-view {
            opacity: 1;
            pointer-events: all;
        }

        .details-container {
            display: flex;
            gap: 4rem;
            max-width: 1000px;
            width: 90%;
            align-items: center;
        }

        .details-image img {
            width: 40vmin;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .details-text {
            color: var(--text-color);
        }

        .details-text h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .details-text p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: rgba(245, 224, 220, 0.8);
        }

        #close-details {
            padding: 10px 24px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }

        #close-details:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* --- RESPONSIVENESS --- */
        @media (max-width: 768px) {
            #search-input { width: 80%; }
            #search-input:focus { width: 90%; }
            .details-container { flex-direction: column; text-align: center; gap: 2rem; }
            .details-image img { width: 60vmin; }
            .image-wrapper { width: 45vmin; height: 65vmin; }
        }
    </style>
</head>
<body>
    <div id="blob"></div>
    <div id="blur"></div>

    <nav id="glass-nav">
        <button class="nav-tab active" data-section="book">
            <span class="tab-icon">📚</span> Book Club
        </button>
        <button class="nav-tab" data-section="gallery">
            <span class="tab-icon">🎨</span> My Drawings
        </button>
    </nav>

    <section id="book-section">
        <div id="search-container">
            <input type="text" id="search-input" placeholder="🔍  Find a book...">
        </div>

        <div class="track-container">
            <div class="year-header">2025</div>
            <div class="image-track" data-percentage="0">
                <div class="image-wrapper" data-title="Jane Eyre" data-description="A novel that challenges the conventions of its time...">
                    <img src="https://placehold.co/400x600/1a1a2e/f38ba8?text=Jane+Eyre" alt="Jane Eyre" />
                </div>
                <div class="image-wrapper" data-title="The Great Gatsby" data-description="A tragic story of obsession, wealth, and the elusive nature of the American Dream...">
                    <img src="https://placehold.co/400x600/1a1a2e/f38ba8?text=The+Great+Gatsby" alt="The Great Gatsby" />
                </div>
                <div class="image-wrapper" data-title="The Wizard of Oz" data-description="Dorothy's magical journey down the Yellow Brick Road...">
                    <img src="https://placehold.co/400x600/1a1a2e/f38ba8?text=Wizard+of+Oz" alt="Wizard of Oz" />
                </div>
                <div class="image-wrapper" data-title="We" data-description="The dystopian masterpiece by Yevgeny Zamyatin...">
                    <img src="https://placehold.co/400x600/1a1a2e/cba6f7?text=We" alt="We" />
                </div>
                <div class="image-wrapper" data-title="Herland" data-description="A feminist utopian novel about an isolated society...">
                    <img src="https://placehold.co/400x600/1a1a2e/f38ba8?text=Herland" alt="Herland" />
                </div>
            </div>
        </div>

        <div class="track-container">
            <div class="year-header">2026</div>
            <div class="image-track" data-percentage="0">
                <div class="image-wrapper" data-title="2026 Read #1" data-description="Coming soon...">
                    <img src="https://placehold.co/400x600/1a1a2e/cba6f7?text=2026+Book+1" />
                </div>
                <div class="image-wrapper" data-title="2026 Read #2" data-description="Coming soon...">
                    <img src="https://placehold.co/400x600/1a1a2e/cba6f7?text=2026+Book+2" />
                </div>
                <div class="image-wrapper" data-title="2026 Read #3" data-description="Coming soon...">
                    <img src="https://placehold.co/400x600/1a1a2e/cba6f7?text=2026+Book+3" />
                </div>
            </div>
        </div>
    </section>

    <section id="gallery-section">
        <div style="grid-column: 1 / -1; text-align: center; margin-bottom: 20px;">
            <h2 style="font-family: 'Cormorant Garamond'; font-size: 3rem; color: var(--text-color);">My Drawings</h2>
        </div>
        <div style="color: var(--text-color); grid-column: 1/-1;">Gallery content goes here...</div>
    </section>

    <div id="details-view">
        <div class="details-container">
            <div class="details-image">
                <img id="detail-img" src="" alt="Detail View">
            </div>
            <div class="details-text">
                <h2 id="detail-title">Title</h2>
                <p id="detail-desc">Description goes here.</p>
                <button id="close-details">Close</button>
            </div>
        </div>
    </div>

    <script>
        // --- TAB SWITCHING LOGIC ---
        const tabs = document.querySelectorAll('.nav-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (tab.dataset.section === 'gallery') {
                    document.body.classList.add('gallery-mode');
                } else {
                    document.body.classList.remove('gallery-mode');
                }
            });
        });

        // --- TRACK DRAGGING LOGIC (Mouse + Touch support) ---
        const tracks = document.querySelectorAll('.image-track');
        
        tracks.forEach(track => {
            let isDown = false;
            let startX;
            let prevPercentage = parseFloat(track.dataset.percentage) || 0;

            const startDrag = (e) => {
                isDown = true;
                startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            };

            const stopDrag = () => {
                isDown = false;
                track.dataset.percentage = prevPercentage;
            };

            const moveDrag = (e) => {
                if (!isDown) return;
                const currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const mouseDelta = parseFloat(startX) - currentX;
                const maxDelta = window.innerWidth / 2;
                
                const percentage = (mouseDelta / maxDelta) * -100;
                let nextPercentageUnconstrained = prevPercentage + percentage;
                let nextPercentage = Math.max(Math.min(nextPercentageUnconstrained, 0), -100);
                
                prevPercentage = nextPercentage;
                track.dataset.percentage = nextPercentage;
                
                // Animate track
                track.animate({
                    transform: `translate(${nextPercentage}%, -50%)`
                }, { duration: 1200, fill: "forwards" });

                // Animate image object-position for parallax effect
                for (const image of track.getElementsByTagName("img")) {
                    image.animate({
                        objectPosition: `${100 + nextPercentage}% center`
                    }, { duration: 1200, fill: "forwards" });
                }
                
                startX = currentX; // Reset startX for smooth continuous dragging
            };

            // Mouse Events
            track.addEventListener('mousedown', startDrag);
            window.addEventListener('mouseup', stopDrag);
            window.addEventListener('mousemove', moveDrag);

            // Touch Events (Mobile)
            track.addEventListener('touchstart', startDrag, {passive: true});
            window.addEventListener('touchend', stopDrag);
            window.addEventListener('touchmove', moveDrag, {passive: true});
        });

        // --- SEARCH LOGIC ---
        const searchInput = document.getElementById('search-input');
        const bookWrappers = document.querySelectorAll('.image-wrapper');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            bookWrappers.forEach(wrapper => {
                const title = wrapper.dataset.title.toLowerCase();
                if (title.includes(term)) {
                    wrapper.classList.remove('hidden');
                } else {
                    wrapper.classList.add('hidden');
                }
            });
        });

        // --- DETAILS MODAL LOGIC ---
        const detailsView = document.getElementById('details-view');
        const detailImg = document.getElementById('detail-img');
        const detailTitle = document.getElementById('detail-title');
        const detailDesc = document.getElementById('detail-desc');
        const closeBtn = document.getElementById('close-details');

        // Note: Prevent click triggering immediately after dragging
        let dragTimer;
        window.addEventListener('mousedown', () => clearTimeout(dragTimer));
        window.addEventListener('mousemove', () => dragTimer = setTimeout(() => {}, 100));

        bookWrappers.forEach(wrapper => {
            wrapper.addEventListener('click', (e) => {
                // If we are actively dragging, ignore the click
                if (dragTimer) return; 

                const imgSrc = wrapper.querySelector('img').src;
                const title = wrapper.dataset.title;
                const desc = wrapper.dataset.description;

                detailImg.src = imgSrc;
                detailTitle.textContent = title;
                detailDesc.textContent = desc;

                document.body.classList.add('details-active');
            });
        });

        closeBtn.addEventListener('click', () => {
            document.body.classList.remove('details-active');
        });
    </script>
</body>
</html>
