<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Book Club & Drawing Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #11111b;
            --card-bg: #1a1a2e;
            --text-color: #f5e0dc;
            --accent: #cba6f7;
            --accent-2: #f38ba8;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --glass-shadow: rgba(0, 0, 0, 0.35);
            --glass-blur: 18px;
            --nav-height: 64px;
            --frame-gold: rgba(180, 160, 130, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @keyframes rotate {
            from { rotate: 0deg; }
            50% { scale: 1 1.5; }
            to { rotate: 360deg; }
        }
        @keyframes blobPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.9; }
        }
        #blob {
            background-color: white;
            height: 34vmax;
            aspect-ratio: 1;
            position: fixed;
            left: 50%;
            top: 50%;
            translate: -50% -50%;
            border-radius: 50%;
            background: linear-gradient(to right, #b4befe, #f38ba8);
            animation: rotate 20s infinite, blobPulse 8s ease-in-out infinite;
            opacity: 0.75;
            z-index: -2;
            transition: background 0.8s ease;
            pointer-events: none;
        }
        body.gallery-mode #blob {
            background: linear-gradient(to right, #f0d5a8, #e8c4a0);
            opacity: 0.55;
        }
        #blur {
            height: 100%;
            width: 100%;
            position: fixed;
            z-index: -1;
            backdrop-filter: blur(12vmax);
            pointer-events: none;
        }

        #glass-nav {
            position: fixed;
            top: 16px;
            left: 50%;
            translate: -50% 0;
            z-index: 2000;
            display: flex;
            gap: 6px;
            padding: 6px;
            background: rgba(20, 20, 35, 0.55);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--glass-shadow), 0 1px 0 var(--glass-highlight) inset, 0 -1px 0 rgba(0,0,0,0.3) inset;
            user-select: none;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        .nav-tab {
            position: relative;
            padding: 11px 26px;
            border-radius: 32px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: rgba(245,224,220,0.7);
            background: transparent;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            white-space: nowrap;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-tab.active {
            color: #fff;
            background: rgba(255,255,255,0.12);
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.2) inset, 0 -1px 0 rgba(0,0,0,0.2) inset;
            border: 1px solid rgba(255,255,255,0.22);
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            translate: -50% 0;
            width: 30%;
            height: 2px;
            border-radius: 2px;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent), 0 0 4px var(--accent);
            opacity: 0.8;
        }
        .nav-tab .tab-icon {
            display: inline-block;
            margin-right: 6px;
            font-size: 0.85rem;
            vertical-align: -1px;
        }

        #book-section {
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.4,0,0.2,1);
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
            padding-top: 80px;
        }
        body.gallery-mode #book-section {
            opacity: 0;
            transform: translateY(-30px);
            pointer-events: none;
            position: absolute;
            width: 100%;
        }

        #gallery-section {
            position: fixed;
            inset: 0;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.4,0,0.2,1);
            transform: translateY(20px);
            overflow-y: auto;
            overflow-x: hidden;
            padding: calc(var(--nav-height) + 40px) 5vw 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 28px;
            align-content: start;
            justify-items: center;
            background: radial-gradient(ellipse at 50% 30%, rgba(20,18,28,0.5) 0%, rgba(17,17,27,0.85) 70%);
            scroll-behavior: smooth;
        }
        body.gallery-mode #gallery-section {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }
        body.gallery-mode {
            overflow: hidden;
        }
        body.gallery-mode #gallery-section {
            overflow-y: auto;
        }

        .gallery-item {
            position: relative;
            width: 100%;
            max-width: 340px;
            aspect-ratio: 3 / 4;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.4s cubic-bezier(0.25,0,0.25,1), box-shadow 0.4s cubic-bezier(0.25,0,0.25,1);
            box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);
        }
        .gallery-item .glass-frame {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            border-radius: 6px;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.18);
            box-shadow: 0 0 0 8px rgba(20,18,15,0.7), 0 0 0 10px rgba(180,160,130,0.2), 0 0 0 11px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.2), inset 1px 0 0 rgba(255,255,255,0.1), inset -1px 0 0 rgba(0,0,0,0.15);
            transition: all 0.4s cubic-bezier(0.25,0,0.25,1);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 4px;
            position: relative;
            z-index: 1;
            filter: brightness(0.95) contrast(1.02);
            transition: filter 0.4s ease, transform 0.4s ease;
        }
        .gallery-label {
            position: absolute;
            bottom: -32px;
            left: 50%;
            translate: -50% 0;
            z-index: 3;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            font-size: 0.9rem;
            font-style: italic;
            color: rgba(245,224,220,0.7);
            text-align: center;
            white-space: nowrap;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        #gallery-lightbox {
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            cursor: pointer;
        }
        #gallery-lightbox.active {
            opacity: 1;
            pointer-events: all;
        }
        #gallery-lightbox img {
            max-width: 85vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 0 12px rgba(20,18,15,0.8), 0 0 0 14px rgba(180,160,130,0.25), 0 0 0 16px rgba(0,0,0,0.6), 0 40px 80px rgba(0,0,0,0.6);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.25,0,0.25,1);
        }
        #gallery-lightbox.active img {
            transform: scale(1);
        }
        #lightbox-close {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 3001;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        #gallery-lightbox.active ~ #lightbox-close,
        #lightbox-close.visible {
            opacity: 1;
            pointer-events: all;
        }

        #lightbox-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
            z-index: 3002;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        #search-container {
            position: fixed;
            top: 80px;
            left: 0;
            width: 100%;
            padding: 16px 20px;
            z-index: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
        }
        #search-input {
            background: rgba(30,30,48,0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.18);
            padding: 13px 28px;
            border-radius: 34px;
            color: var(--text-color);
            font-size: 1rem;
            width: 300px;
            outline: none;
            transition: width 0.35s cubic-bezier(0.4,0,0.2,1), box-shadow 0.35s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.08) inset;
        }

        .year-header {
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 900;
            color: rgba(255,255,255,0.025);
            position: absolute;
            left: 5vw;
            pointer-events: none;
            z-index: 0;
            line-height: 1;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            letter-spacing: -0.02em;
        }
        .track-container {
            position: relative;
            height: 60vh;
            width: 100vw;
            display: flex;
            align-items: center;
            margin-bottom: 5vh;
        }
        .image-track {
            display: flex;
            gap: 4vmin;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(0%, -50%);
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
            transition: opacity 0.5s ease;
        }
        .image-wrapper {
            position: relative;
            width: 35vmin;
            height: 50vmin;
            cursor: pointer;
            flex-shrink: 0;
            border-radius: 8px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 100% center;
            display: block;
            border-radius: 8px;
            pointer-events: none;
        }
        .image-wrapper::after {
            content: "";
            position: absolute;
            inset: 0;
            background-color: var(--tint, transparent);
            mix-blend-mode: multiply;
            opacity: 0.4;
            pointer-events: none;
            transition: opacity 0.4s ease;
            border-radius: 8px;
        }
        .image-wrapper.dimmed {
            opacity: 0.15;
            transform: scale(0.88);
            pointer-events: none;
            filter: grayscale(0.5);
        }

        #details-view { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: flex-start; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        #details-background { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(40px) brightness(0.25); z-index: 0; transform: scale(1.1); }
        body.details-active #details-view { opacity: 1; pointer-events: all; }
        body.details-active { overflow: hidden; }
        #details-content { position: relative; z-index: 10; width: 50vw; height: 100vh; color: var(--text-color); padding: 8vmin; display: flex; flex-direction: column; justify-content: center; transform: translateX(-20px); transition: transform 0.5s ease; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        body.details-active #details-content { transform: translateX(0); }
        .image-wrapper.expanded { width: 40vw; height: 80vh; z-index: 1003; top: 50% !important; left: 75% !important; transform: translate(-50%, -50%) rotate(0deg) !important; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border-radius: 12px; }
        .image-wrapper.expanded::after { opacity: 0; }
        .image-wrapper.expanded img { border-radius: 12px; object-fit: contain; }

        @media (max-width: 768px) {
            #glass-nav { top: 8px; padding: 4px; gap: 3px; border-radius: 30px; }
            .nav-tab { padding: 9px 16px; font-size: 0.78rem; border-radius: 24px; }
            #search-container { top: 70px; padding: 12px 10px; }
            #search-input { width: 80vw; max-width: 280px; padding: 11px 20px; font-size: 0.9rem; }
            #gallery-section { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 18px; padding: calc(var(--nav-height) + 24px) 16px 40px; }
            .image-wrapper { width: 55vw; height: 80vw; }
            #details-content { width: 100vw; height: 100vh; padding: 50vh 8vw 5vh 8vw; justify-content: flex-end; z-index: 15; }
            .image-wrapper.expanded { width: 65vw !important; height: auto !important; aspect-ratio: 3/4; top: 25% !important; left: 50% !important; z-index: 5 !important; }
            #lightbox-close { top: 16px; right: 16px; width: 48px; height: 48px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div id="blob"></div>
    <div id="blur"></div>

    <nav id="glass-nav">
        <button class="nav-tab active" data-section="book">📚 Book Club</button>
        <button class="nav-tab" data-section="gallery">🎨 My Drawings</button>
    </nav>

    <!-- Book Club Section -->
    <section id="book-section">
        <div id="search-container">
            <input type="text" id="search-input" placeholder="🔍  Find a book..." autocomplete="off">
        </div>

        <div class="track-container">
            <div class="year-header" style="top: 10%;">2025</div>
            <div class="image-track" data-mouse-down-at="0" data-prev-percentage="0" data-percentage="0">
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="Jane Eyre" data-description="A novel that challenges the conventions of its time, presenting a fierce, independent heroine who refuses to compromise her integrity for love or societal acceptance."><img src="JE2025.jpg" draggable="false" alt="Jane Eyre Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="The Great Gatsby" data-description="A tragic story of obsession, wealth, and the elusive nature of the American Dream, set against the glittering backdrop of the Jazz Age."><img src="GGCover.jpg" draggable="false" alt="The Great Gatsby Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="The Wonderful Wizard of Oz" data-description="Dorothy's magical journey down the Yellow Brick Road, discovering that courage, heart, and brains are found within oneself."><img src="OZCover.jpg" draggable="false" alt="Wizard of Oz Cover"></div>
                <div class="image-wrapper" style="--tint:#cba6f7;" data-title="We" data-description="The dystopian masterpiece by Yevgeny Zamyatin that inspired 1984 and Brave New World, depicting a world of absolute logic and no individuality."><img src="WECover.jpg" draggable="false" alt="We Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="Herland" data-description="A feminist utopian novel about an isolated society composed entirely of women, who reproduce via parthenogenesis and live in peace."><img src="HCover.jpg" draggable="false" alt="Herland Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="Alice in Wonderland" data-description="A whimsical descent into a nonsense world of white rabbits, mad hatters, and smiling cats, exploring the fluid nature of reality and logic."><img src="AWCover.jpg" draggable="false" alt="Alice in Wonderland Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="The Secret Garden" data-description="A touching story of healing and friendship as an orphaned girl restores a locked, neglected garden and, in the process, her own spirit."><img src="SGCover.webp" draggable="false" alt="The Secret Garden Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="Pride and Prejudice" data-description="The witty, romantic clash between the opinionated Elizabeth Bennet and the proud Mr. Darcy, exploring themes of love, reputation, and class."><img src="PPCover.jpg" draggable="false" alt="Pride and Prejudice Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="The Time Machine" data-description="H.G. Wells' science fiction classic that takes a journey to the distant future, revealing a split human race: the Eloi and the Morlocks."><img src="TMCover.jpg" draggable="false" alt="The Time Machine Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="The Lost World" data-description="An expedition to a plateau in the Amazon basin where prehistoric animals still survive. A thrilling tale of adventure and discovery."><img src="LWCover.jpg" draggable="false" alt="The Lost World Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="Great Expectations" data-description="The coming-of-age story of Pip, an orphan who comes into a fortune, exploring ambition, class, and the true nature of gentility."><img src="GECover.jpg" draggable="false" alt="Great Expectations Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="An Absolutely Remarkable Thing" data-description="A modern sci-fi tale about first contact, fame, and the internet age, triggered by the appearance of giant robot statues across the globe."><img src="AARTCover.jpg" draggable="false" alt="An Absolutely Remarkable Thing Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="And Then There Were None" data-description="Agatha Christie's masterpiece mystery. Ten strangers are lured to an island, and one by one, they are accused of murder... and then they die."><img src="ATWNCover.JPG" draggable="false" alt="And Then There Were None Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="Dracula" data-description="The quintessential vampire novel told through letters and diaries, detailing the battle between the vampire hunter Van Helsing and the ancient Count."><img src="DCover.jpg" draggable="false" alt="Dracula Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="The Art of Hearing Heartbeats" data-description="A poignant love story set in Burma, about a daughter's journey to find her missing father and the magical history she uncovers."><img src="AHH2.png" draggable="false" alt="The Art of Hearing Heartbeats Cover"></div>
                <div class="image-wrapper" style="--tint:#f38ba8;" data-title="Near Miss" data-description="A Stone Barrington novel by Stuart Woods. A fast-paced thriller involving high stakes, international intrigue, and dangerous enemies."><img src="NMCover.jpg" draggable="false" alt="Near Miss Cover"></div>
            </div>
        </div>

        <div class="track-container">
            <div class="year-header" style="top: 10%;">2026</div>
            <div class="image-track" data-mouse-down-at="0" data-prev-percentage="0" data-percentage="0">
                <div class="image-wrapper" style="--tint:#cba6f7;" data-title="2026 Read #1" data-description="Coming soon..."><img src="https://placehold.co/400x600/1a1a2e/cba6f7?text=2026+Book+1" draggable="false"></div>
                <div class="image-wrapper" style="--tint:#cba6f7;" data-title="2026 Read #2" data-description="Coming soon..."><img src="https://placehold.co/400x600/1a1a2e/cba6f7?text=2026+Book+2" draggable="false"></div>
                <div class="image-wrapper" style="--tint:#cba6f7;" data-title="2026 Read #3" data-description="Coming soon..."><img src="https://placehold.co/400x600/1a1a2e/cba6f7?text=2026+Book+3" draggable="false"></div>
                <div class="image-wrapper" style="--tint:#cba6f7;" data-title="2026 Read #4" data-description="Coming soon..."><img src="https://placehold.co/400x600/1a1a2e/cba6f7?text=2026+Book+4" draggable="false"></div>
                <div class="image-wrapper" style="--tint:#cba6f7;" data-title="2026 Read #5" data-description="Coming soon..."><img src="https://placehold.co/400x600/1a1a2e/cba6f7?text=2026+Book+5" draggable="false"></div>
                <div class="image-wrapper" style="--tint:#cba6f7;" data-title="2026 Read #6" data-description="Coming soon..."><img src="https://placehold.co/400x600/1a1a2e/cba6f7?text=2026+Book+6" draggable="false"></div>
                <div class="image-wrapper" style="--tint:#cba6f7;" data-title="2026 Read #7" data-description="Coming soon..."><img src="https://placehold.co/400x600/1a1a2e/cba6f7?text=2026+Book+7" draggable="false"></div>
            </div>
        </div>
    </section>

    <!-- Drawing Gallery -->
    <section id="gallery-section">
        <div class="gallery-section-header">
            <h2>My Drawings</h2>
            <p class="subtitle">Click any artwork to enlarge</p>
        </div>
        <div id="gallery-grid" style="display: contents;"></div>
        <div id="gallery-loading">Loading drawings from PDFs…</div>
    </section>

    <div id="gallery-lightbox">
        <div id="lightbox-spinner"></div>
        <img src="" alt="Enlarged drawing" id="lightbox-img">
    </div>
    <button id="lightbox-close" aria-label="Close lightbox">✕</button>

    <div id="details-view">
        <div id="details-background"></div>
        <div id="details-content">
            <h2 id="details-title">Title</h2>
            <p id="details-description">Desc</p>
            <button id="back-button">←  Close</button>
        </div>
    </div>

    <script>
        // ---------- PDF GALLERY (fast thumbnails + on‑demand high‑res) ----------
        const PDF_FILES = ['drawings1.pdf', 'drawings2.pdf', 'drawings3.pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const pdfDocCache = [];
        let galleryRendered = false;
        const galleryGrid = document.getElementById('gallery-grid');
        const galleryLoading = document.getElementById('gallery-loading');
        const lightbox = document.getElementById('gallery-lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxClose = document.getElementById('lightbox-close');
        const spinner = document.getElementById('lightbox-spinner');

        async function loadGalleryFromPDFs() {
            if (galleryRendered) return;
            galleryLoading.style.display = 'block';

            let globalNumber = 1;
            try {
                for (let f = 0; f < PDF_FILES.length; f++) {
                    const pdfUrl = PDF_FILES[f];
                    console.log(`📄 Loading PDF: ${pdfUrl}`);
                    const pdfDoc = await pdfjsLib.getDocument(pdfUrl).promise;
                    pdfDocCache.push(pdfDoc);
                    const totalPages = pdfDoc.numPages;

                    for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                        const page = await pdfDoc.getPage(pageNum);
                        // low‑res thumbnail (scale 0.5, JPEG quality 0.7)
                        const viewport = page.getViewport({ scale: 0.5 });
                        const canvas = document.createElement('canvas');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        const ctx = canvas.getContext('2d');
                        await page.render({ canvasContext: ctx, viewport }).promise;
                        const thumbDataUrl = canvas.toDataURL('image/jpeg', 0.7);

                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        item.setAttribute('data-pdf-index', f);
                        item.setAttribute('data-page-num', pageNum);

                        const img = document.createElement('img');
                        img.src = thumbDataUrl;
                        img.alt = `Drawing ${globalNumber}`;
                        img.loading = 'lazy';
                        img.draggable = false;

                        const frame = document.createElement('div');
                        frame.className = 'glass-frame';
                        const label = document.createElement('span');
                        label.className = 'gallery-label';
                        label.textContent = `Drawing ${globalNumber}`;

                        item.appendChild(img);
                        item.appendChild(frame);
                        item.appendChild(label);

                        item.addEventListener('click', async (e) => {
                            if (window.getSelection().toString().length > 0) return;
                            const pdfIdx = parseInt(item.dataset.pdfIndex);
                            const pg = parseInt(item.dataset.pageNum);
                            openLightboxWithHighRes(pdfIdx, pg);
                        });

                        galleryGrid.appendChild(item);
                        globalNumber++;
                    }
                }
                galleryLoading.style.display = 'none';
                galleryRendered = true;
            } catch (err) {
                console.error(err);
                galleryLoading.innerHTML = '⚠️ Could not load drawings.';
                galleryLoading.style.color = '#f38ba8';
            }
        }

        async function openLightboxWithHighRes(pdfIndex, pageNum) {
            lightbox.classList.add('active');
            lightboxClose.classList.add('visible');
            spinner.style.display = 'block';
            lightboxImg.style.opacity = '0';
            document.body.style.overflow = 'hidden';

            try {
                const pdfDoc = pdfDocCache[pdfIndex];
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;
                lightboxImg.src = canvas.toDataURL('image/jpeg', 0.92);
            } catch (e) {
                console.error('High‑res render failed:', e);
            } finally {
                spinner.style.display = 'none';
                lightboxImg.style.opacity = '1';
            }
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            lightboxClose.classList.remove('visible');
            spinner.style.display = 'none';
            lightboxImg.style.opacity = '1';
            if (!document.body.classList.contains('gallery-mode')) {
                document.body.style.overflow = '';
            }
            setTimeout(() => { if (!lightbox.classList.contains('active')) lightboxImg.src = ''; }, 400);
        }

        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
        lightboxClose.addEventListener('click', closeLightbox);

        // ---------- NAVIGATION ----------
        const navTabs = document.querySelectorAll('.nav-tab');
        const body = document.body;
        navTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                if (tab.classList.contains('active')) return;
                navTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const section = tab.dataset.section;
                if (section === 'gallery') {
                    body.classList.add('gallery-mode');
                    body.classList.remove('details-active');
                    const expanded = document.querySelector('.image-wrapper.expanded');
                    if (expanded) resetExpandedCard(expanded);
                    if (!galleryRendered) loadGalleryFromPDFs();
                } else {
                    body.classList.remove('gallery-mode');
                }
            });
        });

        // ---------- BOOK CLUB (search & drag) ----------
        const searchInput = document.getElementById('search-input');
        const allWrappers = document.querySelectorAll('.image-wrapper');
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            allWrappers.forEach(w => {
                const title = w.dataset.title.toLowerCase();
                w.classList.toggle('dimmed', !title.includes(val));
            });
        });

        let activeTrack = null;
        let isDragging = false;
        let startX = 0;
        let touchStartX = 0, touchStartY = 0;

        const handleOnDown = (e) => {
            if (document.body.classList.contains('details-active') || document.body.classList.contains('gallery-mode')) return;
            activeTrack = e.target.closest('.image-track');
            if (!activeTrack) return;
            const clientX = e.clientX || e.touches[0].clientX;
            startX = clientX;
            activeTrack.dataset.mouseDownAt = clientX;
            isDragging = false;
            if (e.touches) {
                touchStartX = clientX;
                touchStartY = e.touches[0].clientY;
            }
        };

        const handleOnUp = () => {
            if (activeTrack) {
                activeTrack.dataset.mouseDownAt = "0";
                activeTrack.dataset.prevPercentage = activeTrack.dataset.percentage;
                activeTrack = null;
            }
            isDragging = false;
        };

        const handleOnMove = (e) => {
            if (!activeTrack || activeTrack.dataset.mouseDownAt === "0") return;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            if (clientX === undefined) return;

            // Touch: only prevent default if horizontal drag is dominant (>10px and more horizontal than vertical)
            if (e.touches) {
                const touchY = e.touches[0].clientY;
                const dx = clientX - touchStartX;
                const dy = touchY - touchStartY;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
                    e.preventDefault();
                }
            }

            const mouseDelta = parseFloat(activeTrack.dataset.mouseDownAt) - clientX;
            if (Math.abs(mouseDelta) > 5) isDragging = true;
            const maxDelta = window.innerWidth / 2;
            const percentage = (mouseDelta / maxDelta) * -100;
            let nextPercentage = parseFloat(activeTrack.dataset.prevPercentage) + percentage;
            nextPercentage = Math.max(Math.min(nextPercentage, 0), -100);
            activeTrack.dataset.percentage = nextPercentage;
            activeTrack.style.transform = `translate(${nextPercentage}%, -50%)`;

            const images = activeTrack.getElementsByClassName("image-wrapper");
            for (const wrapper of images) {
                const img = wrapper.querySelector("img");
                img.style.objectPosition = `${100 + nextPercentage}% center`;
                wrapper.style.transform = `rotate(${nextPercentage * 0.2}deg)`;
            }
        };

        window.addEventListener('mousedown', handleOnDown);
        window.addEventListener('touchstart', handleOnDown, { passive: false });
        window.addEventListener('mouseup', handleOnUp);
        window.addEventListener('touchend', handleOnUp);
        window.addEventListener('mousemove', handleOnMove);
        window.addEventListener('touchmove', handleOnMove, { passive: false });

        // blob movement
        const blob = document.getElementById("blob");
        window.addEventListener('pointermove', event => {
            const { clientX, clientY } = event;
            blob.style.left = `${clientX}px`;
            blob.style.top = `${clientY}px`;
        });

        // Book details overlay
        const detailsView = document.getElementById("details-view");
        const detailsBg = document.getElementById("details-background");
        const backButton = document.getElementById("back-button");
        const detailsTitle = document.getElementById("details-title");
        const detailsDescription = document.getElementById("details-description");
        let originalStyle = "";

        allWrappers.forEach(wrapper => {
            wrapper.addEventListener("click", () => {
                if (isDragging) return;
                if (document.body.classList.contains("gallery-mode")) return;
                detailsTitle.textContent = wrapper.dataset.title;
                detailsDescription.textContent = wrapper.dataset.description;
                const img = wrapper.querySelector("img");
                detailsBg.style.backgroundImage = `url(${img.src})`;
                detailsTitle.style.color = wrapper.style.getPropertyValue("--tint");
                originalStyle = wrapper.getAttribute("style");
                const rect = wrapper.getBoundingClientRect();
                wrapper.style.position = 'fixed';
                wrapper.style.top = `${rect.top}px`;
                wrapper.style.left = `${rect.left}px`;
                wrapper.style.width = `${rect.width}px`;
                wrapper.style.height = `${rect.height}px`;
                wrapper.style.zIndex = '1001';
                requestAnimationFrame(() => {
                    document.body.classList.add("details-active");
                    wrapper.classList.add("expanded");
                });
            });
        });

        function resetExpandedCard(expandedWrapper) {
            if (!expandedWrapper) return;
            expandedWrapper.classList.remove("expanded");
            expandedWrapper.addEventListener('transitionend', () => {
                if (originalStyle) expandedWrapper.setAttribute("style", originalStyle);
                else expandedWrapper.removeAttribute("style");
                const parentTrack = expandedWrapper.closest('.image-track');
                if (parentTrack) {
                    const currentPercent = parseFloat(parentTrack.dataset.percentage) || 0;
                    expandedWrapper.style.transform = `rotate(${currentPercent * 0.2}deg)`;
                }
            }, { once: true });
        }

        const hideDetails = () => {
            const expandedWrapper = document.querySelector(".image-wrapper.expanded");
            if (!expandedWrapper) return;
            document.body.classList.remove("details-active");
            resetExpandedCard(expandedWrapper);
        };

        backButton.addEventListener("click", hideDetails);
        detailsView.addEventListener("click", (e) => {
            if (e.target === detailsView || e.target === detailsBg) hideDetails();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (lightbox.classList.contains('active')) closeLightbox();
                else if (document.body.classList.contains('details-active')) hideDetails();
            }
        });

        document.addEventListener('dragstart', (e) => {
            if (e.target.tagName === 'IMG') e.preventDefault();
        });

        window.addEventListener('load', () => {
            body.classList.remove('gallery-mode');
            document.querySelector('.nav-tab[data-section="book"]').classList.add('active');
        });
    </script>
</body>
</html>
